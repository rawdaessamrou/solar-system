name: Solar System CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: solar-system
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name solar-system-cluster \
            --region us-east-1

      - name: Force clean deploy
        run: |
          # Force delete all solar-system pods and deployment
          kubectl delete deployment solar-system --ignore-not-found=true
          kubectl delete pods -l app=solar-system --force --grace-period=0 || true

          # Wait for all pods to be fully gone
          kubectl wait pod \
            -l app=solar-system \
            --for=delete \
            --timeout=60s || true

          # Apply fresh
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for pod to be Ready
        run: |
          kubectl wait pod \
            -l app=solar-system \
            --for=condition=Ready \
            --timeout=180s

      - name: Set env vars
        run: |
          kubectl set env deployment/solar-system \
            MONGO_URI="mongodb+srv://supercluster.d83jj.mongodb.net/superData" \
            MONGO_USERNAME="superuser" \
            MONGO_PASSWORD="SuperPassword"

      - name: Get app URL
        run: |
          echo "🌍 App URL:"
          kubectl get svc solar-system-svc \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
